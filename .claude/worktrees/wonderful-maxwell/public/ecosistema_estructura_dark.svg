<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#080808"/>
      <stop offset="0.5" stop-color="#111111"/>
      <stop offset="1" stop-color="#191B1D"/>
    </linearGradient>
    <radialGradient id="focus" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(540 640) rotate(90) scale(420 460)">
      <stop stop-color="white" stop-opacity="0.25"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="marble" x1="160" y1="260" x2="920" y2="1120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F2F4F6"/>
      <stop offset="0.5" stop-color="#D7DBE0"/>
      <stop offset="1" stop-color="#C2C8CF"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.8" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#focus)"/>

  <rect x="140" y="220" width="800" height="920" rx="26" fill="#1C1F22" stroke="#2B2F33" stroke-width="2"/>

  <rect x="220" y="300" width="640" height="760" rx="20" fill="#F4F7FA"/>

  <g opacity="0.95">
    <rect x="260" y="340" width="560" height="120" rx="14" fill="url(#marble)"/>
    <rect x="260" y="500" width="260" height="250" rx="14" fill="url(#marble)"/>
    <rect x="560" y="500" width="260" height="250" rx="14" fill="url(#marble)"/>
    <rect x="260" y="790" width="560" height="230" rx="14" fill="url(#marble)"/>
  </g>

  <g stroke="#7A828A" stroke-opacity="0.45" stroke-width="3">
    <path d="M300 390C380 360 470 430 550 390C640 345 730 455 800 398"/>
    <path d="M300 890C400 850 480 940 560 900C650 860 730 950 800 910"/>
    <path d="M290 620C360 560 430 690 520 620"/>
    <path d="M570 620C640 560 710 690 800 620"/>
  </g>

  <rect width="1080" height="1350" fill="#FFFFFF" filter="url(#grain)" opacity="0.9"/>
</svg>
