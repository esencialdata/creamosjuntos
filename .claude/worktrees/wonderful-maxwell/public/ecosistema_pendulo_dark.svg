<svg width="1080" height="1350" viewBox="0 0 1080 1350" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1080" y2="1350" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#070707"/>
      <stop offset="0.45" stop-color="#111315"/>
      <stop offset="1" stop-color="#1A1D1F"/>
    </linearGradient>
    <radialGradient id="lightA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 180) rotate(21) scale(430 290)">
      <stop stop-color="white" stop-opacity="0.22"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lightB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(930 1140) rotate(-24) scale(430 260)">
      <stop stop-color="white" stop-opacity="0.12"/>
      <stop offset="1" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D3D7DC"/>
      <stop offset="0.45" stop-color="#8B9299"/>
      <stop offset="0.7" stop-color="#596068"/>
      <stop offset="1" stop-color="#BFC5CB"/>
    </linearGradient>
    <radialGradient id="ballGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(0 0) rotate(90) scale(78)">
      <stop stop-color="#FFFFFF" stop-opacity="0.7"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.75" numOctaves="3" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.03"/>
      </feComponentTransfer>
    </filter>
    <filter id="blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#lightA)"/>
  <rect width="1080" height="1350" fill="url(#lightB)"/>

  <rect x="160" y="180" width="760" height="10" rx="5" fill="#A5ACB3" fill-opacity="0.65"/>

  <g stroke="#8C949B" stroke-width="4" stroke-linecap="round" opacity="0.72">
    <path d="M280 190L300 650"/>
    <path d="M420 190L430 650"/>
    <path d="M540 190L540 650"/>
    <path d="M660 190L650 650"/>
    <path d="M800 190L760 650"/>
  </g>

  <g>
    <circle cx="300" cy="650" r="74" fill="url(#steel)"/>
    <circle cx="430" cy="650" r="74" fill="url(#steel)"/>
    <circle cx="540" cy="650" r="74" fill="url(#steel)"/>
    <circle cx="650" cy="650" r="74" fill="url(#steel)"/>
    <circle cx="760" cy="650" r="74" fill="url(#steel)"/>

    <g transform="translate(760 650)">
      <circle r="74" fill="url(#ballGlow)" filter="url(#blur)"/>
    </g>
  </g>

  <path d="M190 1010C340 930 510 1080 660 980C760 912 860 940 930 1016" stroke="#9BA3AA" stroke-opacity="0.25" stroke-width="10" stroke-linecap="round"/>

  <rect width="1080" height="1350" fill="#FFFFFF" filter="url(#grain)" opacity="0.9"/>
</svg>
