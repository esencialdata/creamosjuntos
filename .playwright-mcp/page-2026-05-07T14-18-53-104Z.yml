                  - heading "\"¿Con qué salvaré yo a Israel?\"" [level=2] [ref=e161]
                  - paragraph [ref=e162]: "Gedeón no recibe eso con gratitud. Lo cuestiona: \"Mi familia es la más pobre en Manasés, y yo el menor en la casa de mi padre.\" Tribu equivocada. Familia equivocada. Posición equivocada. Identidad construida con el peor material."
                - generic [ref=e166]:
                  - paragraph [ref=e167]: LA RESPUESTA DE DIOS · Jueces 6:16
                  - heading "\"Ciertamente yo estaré contigo.\"" [level=2] [ref=e169]
                  - paragraph [ref=e170]: Dios no corrige la genealogía. No le asigna una tribu mejor. No le cambia el apellido. La respuesta a la crisis de identidad siempre es presencia, no credenciales.
