                  - heading "Dios lo encuentra en un lagar. Escondido. Encorvado. Con miedo." [level=2] [ref=e142]
                  - paragraph [ref=e143]: Usando el lugar equivocado para hacer lo que podía. ¿Lo conoces? Ese lagar también tiene tu forma.
                - generic [ref=e147]:
                  - paragraph [ref=e148]: LA DECLARACIÓN · Jueces 6:12
                  - heading "\"Jehová está contigo, varón esforzado y valiente.\"" [level=2] [ref=e150]
                  - paragraph [ref=e151]: Y en ese momento — el peor momento — Dios le habla así. No lo llamó por lo que era. Lo llamó por lo que ya era en Su diseño.
